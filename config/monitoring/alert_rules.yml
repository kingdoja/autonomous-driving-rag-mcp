# Prometheus alert rules for AD Knowledge Retrieval System
# These rules define when alerts should be triggered

groups:
  - name: ad_knowledge_alerts
    interval: 30s
    rules:
      # Response time alerts
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(query_response_time_seconds_bucket[5m])) > 6
        for: 5m
        labels:
          severity: warning
          component: query_engine
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }}s (threshold: 6s)"
          
      - alert: CriticalResponseTime
        expr: histogram_quantile(0.95, rate(query_response_time_seconds_bucket[5m])) > 10
        for: 2m
        labels:
          severity: critical
          component: query_engine
        annotations:
          summary: "Critical response time detected"
          description: "95th percentile response time is {{ $value }}s (threshold: 10s)"
      
      # Error rate alerts
      - alert: HighErrorRate
        expr: rate(query_errors_total[5m]) / rate(query_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          component: query_engine
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"
          
      - alert: CriticalErrorRate
        expr: rate(query_errors_total[5m]) / rate(query_requests_total[5m]) > 0.10
        for: 2m
        labels:
          severity: critical
          component: query_engine
        annotations:
          summary: "Critical error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 10%)"
      
      # Citation rate alerts
      - alert: LowCitationRate
        expr: rate(queries_with_citations_total[10m]) / rate(query_requests_total[10m]) < 0.70
        for: 10m
        labels:
          severity: warning
          component: response_builder
        annotations:
          summary: "Low citation rate detected"
          description: "Citation rate is {{ $value | humanizePercentage }} (threshold: 70%)"
          
      - alert: CriticalCitationRate
        expr: rate(queries_with_citations_total[10m]) / rate(query_requests_total[10m]) < 0.60
        for: 5m
        labels:
          severity: critical
          component: response_builder
        annotations:
          summary: "Critical citation rate detected"
          description: "Citation rate is {{ $value | humanizePercentage }} (threshold: 60%)"
      
      # Boundary refusal rate alerts
      - alert: HighBoundaryRefusalRate
        expr: rate(boundary_refusals_total[10m]) / rate(query_requests_total[10m]) > 0.30
        for: 10m
        labels:
          severity: warning
          component: boundary_validator
        annotations:
          summary: "High boundary refusal rate detected"
          description: "Refusal rate is {{ $value | humanizePercentage }} (threshold: 30%)"
          
      - alert: CriticalBoundaryRefusalRate
        expr: rate(boundary_refusals_total[10m]) / rate(query_requests_total[10m]) > 0.50
        for: 5m
        labels:
          severity: critical
          component: boundary_validator
        annotations:
          summary: "Critical boundary refusal rate detected"
          description: "Refusal rate is {{ $value | humanizePercentage }} (threshold: 50%)"
      
      # System resource alerts
      - alert: HighCPUUsage
        expr: 100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value }}% (threshold: 80%)"
          
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value }}% (threshold: 80%)"
          
      - alert: LowDiskSpace
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 80
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "Low disk space detected"
          description: "Disk usage is {{ $value }}% (threshold: 80%)"
      
      # Service availability alerts
      - alert: ServiceDown
        expr: up{job="ad_knowledge_system"} == 0
        for: 1m
        labels:
          severity: critical
          component: system
        annotations:
          summary: "AD Knowledge System is down"
          description: "The AD Knowledge System service has been down for more than 1 minute"
          
      - alert: DatabaseConnectionFailure
        expr: rate(database_connection_errors_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Database connection failures detected"
          description: "Database connection errors: {{ $value }} per second"
      
      # Query performance alerts
      - alert: SlowRetrievalTime
        expr: histogram_quantile(0.95, rate(retrieval_time_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          component: retrieval
        annotations:
          summary: "Slow retrieval time detected"
          description: "95th percentile retrieval time is {{ $value }}s (threshold: 2s)"
          
      - alert: SlowRerankingTime
        expr: histogram_quantile(0.95, rate(reranking_time_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          component: reranker
        annotations:
          summary: "Slow reranking time detected"
          description: "95th percentile reranking time is {{ $value }}s (threshold: 1s)"
      
      # Metadata boost alerts
      - alert: LowBoostApplicationRate
        expr: rate(boost_applied_total[10m]) / rate(boost_eligible_queries_total[10m]) < 0.50
        for: 10m
        labels:
          severity: warning
          component: metadata_booster
        annotations:
          summary: "Low boost application rate detected"
          description: "Boost application rate is {{ $value | humanizePercentage }} (threshold: 50%)"
      
      # Document diversity alerts
      - alert: LowDocumentDiversity
        expr: avg_over_time(document_diversity_score[10m]) < 0.5
        for: 10m
        labels:
          severity: warning
          component: document_grouper
        annotations:
          summary: "Low document diversity detected"
          description: "Average document diversity score is {{ $value }} (threshold: 0.5)"
