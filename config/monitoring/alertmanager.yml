# Alertmanager configuration for AD Knowledge Retrieval System
# This file configures how alerts are routed and delivered

global:
  resolve_timeout: 5m
  # SMTP configuration (update with your SMTP server details)
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alertmanager@example.com'
  smtp_auth_username: 'alertmanager@example.com'
  smtp_auth_password: 'your-password-here'
  smtp_require_tls: true

# Templates for alert notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route tree for alert routing
route:
  # Default grouping
  group_by: ['alertname', 'severity', 'component']
  group_wait: 10s        # Wait before sending first notification
  group_interval: 10s    # Wait before sending batch of new alerts
  repeat_interval: 12h   # Wait before resending notification
  receiver: 'default'
  
  # Child routes for specific alert types
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 5s
      repeat_interval: 4h
      continue: false
    
    # Warning alerts - less urgent
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 30s
      repeat_interval: 24h
      continue: false
    
    # Performance alerts
    - match:
        component: query_engine
      receiver: 'performance-alerts'
      group_wait: 1m
      repeat_interval: 6h
    
    # System resource alerts
    - match:
        component: system
      receiver: 'system-alerts'
      group_wait: 2m
      repeat_interval: 12h

# Alert receivers (notification destinations)
receivers:
  # Default receiver - email to team
  - name: 'default'
    email_configs:
      - to: 'team@example.com'
        headers:
          Subject: '[AD Knowledge] Alert: {{ .GroupLabels.alertname }}'
        html: |
          <h2>Alert: {{ .GroupLabels.alertname }}</h2>
          <p><strong>Severity:</strong> {{ .GroupLabels.severity }}</p>
          <p><strong>Component:</strong> {{ .GroupLabels.component }}</p>
          {{ range .Alerts }}
          <hr>
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
          <p><strong>Started:</strong> {{ .StartsAt }}</p>
          {{ end }}
  
  # Critical alerts - email + Slack
  - name: 'critical-alerts'
    email_configs:
      - to: 'oncall@example.com'
        headers:
          Subject: '[CRITICAL] AD Knowledge Alert: {{ .GroupLabels.alertname }}'
        html: |
          <h1 style="color: red;">CRITICAL ALERT</h1>
          <h2>{{ .GroupLabels.alertname }}</h2>
          <p><strong>Component:</strong> {{ .GroupLabels.component }}</p>
          {{ range .Alerts }}
          <hr>
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
          <p><strong>Started:</strong> {{ .StartsAt }}</p>
          {{ end }}
    # Uncomment and configure for Slack notifications
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
    #     channel: '#critical-alerts'
    #     title: 'Critical Alert: {{ .GroupLabels.alertname }}'
    #     text: |
    #       *Severity:* {{ .GroupLabels.severity }}
    #       *Component:* {{ .GroupLabels.component }}
    #       {{ range .Alerts }}
    #       *Description:* {{ .Annotations.description }}
    #       *Summary:* {{ .Annotations.summary }}
    #       {{ end }}
    #     send_resolved: true
  
  # Warning alerts - email only
  - name: 'warning-alerts'
    email_configs:
      - to: 'team@example.com'
        headers:
          Subject: '[WARNING] AD Knowledge Alert: {{ .GroupLabels.alertname }}'
        html: |
          <h2 style="color: orange;">Warning Alert</h2>
          <h3>{{ .GroupLabels.alertname }}</h3>
          <p><strong>Component:</strong> {{ .GroupLabels.component }}</p>
          {{ range .Alerts }}
          <hr>
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
          <p><strong>Started:</strong> {{ .StartsAt }}</p>
          {{ end }}
  
  # Performance alerts
  - name: 'performance-alerts'
    email_configs:
      - to: 'performance-team@example.com'
        headers:
          Subject: '[Performance] AD Knowledge Alert: {{ .GroupLabels.alertname }}'
        html: |
          <h2>Performance Alert</h2>
          <h3>{{ .GroupLabels.alertname }}</h3>
          {{ range .Alerts }}
          <hr>
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
          <p><strong>Started:</strong> {{ .StartsAt }}</p>
          {{ end }}
  
  # System alerts
  - name: 'system-alerts'
    email_configs:
      - to: 'ops-team@example.com'
        headers:
          Subject: '[System] AD Knowledge Alert: {{ .GroupLabels.alertname }}'
        html: |
          <h2>System Alert</h2>
          <h3>{{ .GroupLabels.alertname }}</h3>
          {{ range .Alerts }}
          <hr>
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
          <p><strong>Started:</strong> {{ .StartsAt }}</p>
          {{ end }}

# Inhibition rules - suppress certain alerts when others are firing
inhibit_rules:
  # Suppress warning alerts when critical alert is firing for same component
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'component']
  
  # Suppress individual component alerts when service is down
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*'
    equal: ['component']
  
  # Suppress high response time alerts when error rate is critical
  - source_match:
      alertname: 'CriticalErrorRate'
    target_match:
      alertname: 'HighResponseTime'
    equal: ['component']
